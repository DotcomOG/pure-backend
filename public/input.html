<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Enter URL for AI SEO Analysis</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #ffffff; /* Pure white background */
        padding: 20px;
        margin: 0;
      }
      .input-container {
        max-width: 500px;
        margin: 0 auto;
        text-align: center;
      }
      h1 {
        font-size: 1.8em;
        margin-bottom: 20px;
        color: #333;
      }
      input[type="url"] {
        width: 100%;
        padding: 10px;
        font-size: 16px;
        box-sizing: border-box;
        border: 1px solid #ccc;
        border-radius: 4px;
      }
      button {
        padding: 10px 20px;
        font-size: 16px;
        margin-top: 10px;
        border: none;
        border-radius: 4px;
        background-color: #007BFF;
        color: #fff;
        cursor: pointer;
      }
      button:hover {
        background-color: #0056b3;
      }
    </style>
  </head>
  <body>
    <div class="input-container">
      <h1>Enter a URL</h1>
      <form action="/friendly" method="GET">
        <input type="url" name="url" placeholder="https://example.com" required>
        <br>
        <button type="submit">Submit</button>
      </form>
    </div>
  </body>
</html>
