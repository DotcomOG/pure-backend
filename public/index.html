<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI SEO Analysis (Powered by ChatGPT)</title>
  <link href="https://fonts.googleapis.com/css2?family=Forum&family=Nunito+Sans:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Nunito Sans', sans-serif; background: #f9f9f9; margin:0; padding:0; }
    header { text-align:center; padding:20px; background:#fff; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
    nav a { margin:0 10px; text-decoration:none; font-weight:600; color:#000; }
    .container { max-width:700px; margin:20px auto; padding:20px; background:#fff; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
    h1,h2 { font-family:'Forum', serif; }
    ul { padding:0; list-style:none; }
    li { margin-bottom:10px; }
    .score { position:relative; height:20px; background:linear-gradient(to right,red,yellow,green); border-radius:10px; }
    .marker { position:absolute; top:0; width:2px; height:100%; background:#000; }
    .percentage { position:absolute; top:0; width:100%; text-align:center; }
    .form-row { display:flex; gap:10px; margin-bottom:10px; }
    input, button { padding:8px; width:100%; box-sizing:border-box; }
    @media (max-width:600px){ .form-row { flex-direction:column; }}
  </style>
</head>
<body>
<header>
  <h2>Yoram Ezra Strategies</h2>
  <nav>
    <a href="/">Home</a>
    <a href="/ai-seo">AI SEO Analyzer</a>
  </nav>
</header>

<div class="container">
  <h1>AI SEO Analysis Summary<br><small>🤖 Powered by ChatGPT 🤖</small></h1>
  <p>URL inspected: <strong id="inspected-url">Loading...</strong></p>

  <div class="score">
    <div class="marker" id="score-marker" style="left:0;"></div>
    <div class="percentage" id="score-percentage">Loading...</div>
  </div>

  <h2>Superpowers (SEO Strengths)</h2>
  <ul id="superpowers-list"><li>Loading...</li></ul>

  <h2>Opportunities for Improvement</h2>
  <ul id="opportunities-list"><li>Loading...</li></ul>

  <h2>AI Engine Insights</h2>
  <ul id="engine-insights-list"><li>Loading...</li></ul>

  <form action="/detailed" method="POST">
    <input type="hidden" name="url" id="hidden-url">
    <div class="form-row">
      <input type="text" name="name" placeholder="Name*" required>
      <input type="email" name="email" placeholder="Email*" required>
    </div>
    <div class="form-row">
      <input type="text" name="company" placeholder="Company/Organization">
    </div>
    <button type="submit">Get Full Report</button>
  </form>
</div>

<script>
document.addEventListener("DOMContentLoaded", function(){
  const inspectedUrl = new URLSearchParams(window.location.search).get("url") || "https://example.com";
  document.getElementById("inspected-url").textContent = inspectedUrl;
  document.getElementById("hidden-url").value = inspectedUrl;

  fetch("/friendly?url=" + encodeURIComponent(inspectedUrl))
    .then(res => res.json())
    .then(data => {
      document.getElementById("score-percentage").textContent = data.score + "%";
      document.getElementById("score-marker").style.left = data.score + "%";

      const populateList = (id, items, emoji, maxItems) => {
        const list = document.getElementById(id);
        list.innerHTML = "";
        items.slice(0, maxItems).forEach(i => {
          const li = document.createElement("li");
          li.innerHTML = `${emoji} <strong>${i.title}:</strong> ${i.explanation}`;
          list.appendChild(li);
        });
      };

      populateList("superpowers-list", data.ai_superpowers, "✅", 5);
      populateList("opportunities-list", data.ai_opportunities, "🚨", 10);

      const insightsList = document.getElementById("engine-insights-list");
      insightsList.innerHTML = "";
      Object.entries(data.ai_engine_insights).forEach(([engine, insight])=>{
        const li = document.createElement("li");
        li.innerHTML = `🤖 <strong>${engine}:</strong> ${insight}`;
        insightsList.appendChild(li);
      });
    })
    .catch(err=>console.error("Error:",err));
});
</script>
</body>
</html>
