<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Detailed AI SEO Report</title>
  <link href="https://fonts.googleapis.com/css2?family=Forum&family=Nunito+Sans:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Nunito Sans', sans-serif; background:#f9f9f9; margin:0; padding:20px; }
    .container { max-width:800px; margin:auto; background:#fff; padding:30px; border-radius:8px; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
    h1,h2 { font-family:'Forum',serif; }
    ul { list-style:none; padding:0; }
    li { margin-bottom:15px; }
    .title { font-weight:bold; }
    .explanation { color:#555; margin-left:15px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Detailed AI SEO Analysis for <span id="detailed-url">Loading...</span></h1>
    <p><strong>Name:</strong> <span id="report-name"></span> | <strong>Email:</strong> <span id="report-email"></span> | <strong>Company:</strong> <span id="report-company"></span></p>

    <h2>🔍 AI Superpowers (What you're doing well)</h2>
    <ul id="detailed-superpowers"></ul>

    <h2>⚠️ AI Opportunities (Areas for improvement)</h2>
    <ul id="detailed-opportunities"></ul>

    <h2>🤖 AI Engine Insights</h2>
    <ul id="detailed-engine-insights"></ul>
  </div>

<script>
document.addEventListener("DOMContentLoaded", function() {
  // Fetch details saved from summary page form
  const url = localStorage.getItem('reportURL') || 'https://example.com';
  const name = localStorage.getItem('reportName');
  const email = localStorage.getItem('reportEmail');
  const company = localStorage.getItem('reportCompany') || 'N/A';

  document.getElementById('detailed-url').textContent = url;
  document.getElementById('report-name').textContent = name;
  document.getElementById('report-email').textContent = email;
  document.getElementById('report-company').textContent = company;

  // Fetch the detailed report data from backend
  fetch(`/detailed-report?url=${encodeURIComponent(url)}`)
    .then(res => res.json())
    .then(data => {
      const renderList = (id, items, emoji) => {
        const list = document.getElementById(id);
        items.forEach(item => {
          const li = document.createElement('li');
          li.innerHTML = `<div class="title">${emoji} ${item.title}</div><div class="explanation">${item.explanation}</div>`;
          list.appendChild(li);
        });
      };

      renderList('detailed-superpowers', data.ai_superpowers, '✅');
      renderList('detailed-opportunities', data.ai_opportunities, '🚨');

      const insightsList = document.getElementById('detailed-engine-insights');
      Object.entries(data.ai_engine_insights).forEach(([engine, insight]) => {
        const li = document.createElement('li');
        li.innerHTML = `<div class="title">🤖 ${engine}</div><div class="explanation">${insight}</div>`;
        insightsList.appendChild(li);
      });
    })
    .catch(console.error);
});
</script>
</body>
</html>
